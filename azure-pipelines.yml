trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Install Node.js'

  - task: Cache@2
    inputs:
      key: 'npm | "$(Agent.OS)" | package-lock.json'
      restoreKeys: |
        npm | "$(Agent.OS)"
    displayName: 'Cache NPM modules'      

  - script: npm install
    displayName: 'Install dependencies'

  - script: npx playwright install --with-deps
    displayName: 'Install Playwright browsers'

  # Run Playwright tests with JUnit + HTML report
  - script: npx playwright test --reporter=junit,html
    displayName: 'Run tests'

  # Publish test results to Azure DevOps
  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: 'test-results/*.xml'
      failTaskOnFailedTests: true
    displayName: 'Publish Test Results'

  # Upload Playwright HTML report
  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: playwright-report
      artifact: playwright-report
    displayName: 'Publish Playwright HTML Report'